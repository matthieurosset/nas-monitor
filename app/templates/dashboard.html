{% extends "base.html" %}
{% block title %}Dashboard - nas-monitor{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Dashboard</h2>
    <span class="badge">Live</span>
    <button class="btn btn-sm" hx-get="/partials/container-stats" hx-target="#container-stats" hx-swap="innerHTML" hx-indicator="#refresh-spinner">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
    </button>
    <span id="refresh-spinner" class="htmx-indicator">loading...</span>
</div>

<div id="container-stats"
     hx-get="/partials/container-stats"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    <div class="loading">Loading container stats...</div>
</div>
{% endblock %}
