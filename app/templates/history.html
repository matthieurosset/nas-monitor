{% extends "base.html" %}
{% block title %}History - nas-monitor{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
{% endblock %}

{% block content %}
<div class="page-header">
    <h2>History</h2>
</div>

<div class="controls-bar">
    <div class="period-selector">
        <button class="btn btn-sm active" data-period="1h">1h</button>
        <button class="btn btn-sm" data-period="6h">6h</button>
        <button class="btn btn-sm" data-period="24h">24h</button>
        <button class="btn btn-sm" data-period="7d">7d</button>
    </div>
    <div class="container-filter">
        <select id="container-select">
            <option value="">All containers</option>
        </select>
    </div>
</div>

<div class="charts-grid">
    <div class="card">
        <div class="card-header"><h3>CPU Usage (%)</h3></div>
        <div class="card-body chart-container">
            <canvas id="cpu-chart"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="card-header"><h3>Memory Usage (%)</h3></div>
        <div class="card-body chart-container">
            <canvas id="memory-chart"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="card-header"><h3>Network RX (MB)</h3></div>
        <div class="card-body chart-container">
            <canvas id="network-chart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
{% endblock %}
